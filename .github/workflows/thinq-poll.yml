name: Poll LG ThinQ → current.json

on:
  schedule:
    # Every 15 minutes (GitHub Actions minimum is 5 min)
    - cron: "*/15 * * * *"
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: write      # needed to git push the updated current.json

jobs:
  poll:
    name: Fetch ThinQ & update current.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No extra pip packages needed — script uses stdlib only

      - name: Run ThinQ poller
        env:
          THINQ_CLIENT_ID:     ${{ secrets.THINQ_CLIENT_ID }}
          THINQ_CLIENT_SECRET: ${{ secrets.THINQ_CLIENT_SECRET }}
          THINQ_ACCESS_TOKEN:  ${{ secrets.THINQ_ACCESS_TOKEN }}
          THINQ_COUNTRY:       PH
          THINQ_LANGUAGE:      en-PH
          BILLING_START_DAY:   "1"       # change to your billing cycle start
          BILLING_DAYS:        "30"
          OUTPUT_PATH:         bill/current/current.json
        run: python bill/current/fetch_thinq.py

      - name: Commit & push current.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bill/current/current.json
          # Only commit if there are actual changes
          git diff --cached --quiet && echo "No changes, skipping commit." || \
          git commit -m "chore: update current.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

Setup checklist:

GitHub Secrets — add these in repo Settings → Secrets → Actions:
THINQ_CLIENT_ID, THINQ_CLIENT_SECRET — from thinq.developer.lge.com
THINQ_ACCESS_TOKEN — OAuth bearer token from your ThinQ app credentials
Billing cycle — edit BILLING_START_DAY in the workflow YAML to match when your CENPELCO period starts
First run — trigger manually via Actions tab to generate current.json before the cron kicks in
How the dashboard works:

Loads current.json (device data) + ../rates.json (tariff) in parallel
Computes kWh/day average → projects end-of-period kWh → runs through the same unbundled rate calc as bill/
Shows per-device wattage bars, on/off status, and a live projection bar
Flags stale data (badge appears if polled_at is >30 min old)
One caveat: the ThinQ v2 energy keys (energyDailyUsage, energyMonthlyUsage, etc.) vary slightly by appliance class. If a device returns zeros, check its raw status JSON and adjust the field names in the parse_device() function — I've covered the most common ones.



##############################################################################
# .github/workflows/poll_thinq.yml
#
# Polls LG ThinQ Connect API every 15 minutes, writes current.json,
# and commits it back to the repo so the live-monitor page stays fresh.
#
# Required repository secrets (Settings → Secrets → Actions):
#   THINQ_PAT         Personal Access Token from smartsolution.developer.lge.com
#   THINQ_CLIENT_ID   One-time generated UUID4  →  python -c "import uuid; print(uuid.uuid4())"
#
# Optional secrets / variables:
#   THINQ_BASE_URL    Override API region (see fetch_thinq.py header for options)
#   BILLING_START_DAY Day-of-month your meter resets (default 26)
##############################################################################

name: 🔌 Poll LG ThinQ

on:
  schedule:
    - cron: '0,15,30,45 * * * *'   # every 15 minutes
  workflow_dispatch:                 # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  poll:
    name: Fetch & commit current.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'                # works now that requirements.txt exists

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ThinQ data
        env:
          THINQ_PAT:         ${{ secrets.THINQ_PAT }}
          THINQ_CLIENT_ID:   ${{ secrets.THINQ_CLIENT_ID }}
          THINQ_COUNTRY:     PH
          # THINQ_BASE_URL:  ${{ secrets.THINQ_BASE_URL }}   ← uncomment if needed
          BILLING_START_DAY: '26'
          OUTPUT_PATH:       docs/current/current.json
        run: python scripts/fetch_thinq.py

      - name: Commit current.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/current/current.json
          if git diff --staged --quiet; then
            echo "ℹ No changes — data unchanged since last poll."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            git commit -m "chore(thinq): poll ${TIMESTAMP}"
            git push
            echo "✓ Pushed updated current.json"
          fi

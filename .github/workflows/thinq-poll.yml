name: Poll LG ThinQ → current.json

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: write      # needed to git push the updated current.json

jobs:
  poll:
    name: Fetch ThinQ & update current.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip installs needed — script uses stdlib only (urllib, json, uuid, base64)

      - name: Run ThinQ poller
        env:
          # Secrets — set in repo Settings → Secrets → Actions
          THINQ_PAT:         ${{ secrets.THINQ_PAT }}        # PAT from connect-pat.lgthinq.com
          THINQ_CLIENT_ID:   ${{ secrets.THINQ_CLIENT_ID }}  # any stable unique string you choose

          # Non-secret config — edit directly here
          THINQ_COUNTRY:     PH
          BILLING_START_DAY: "1"    # day-of-month your CENPELCO billing period starts
          BILLING_DAYS:      "30"
          OUTPUT_PATH:       bill/current/current.json
        run: python bill/current/fetch_thinq.py

      - name: Commit & push current.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bill/current/current.json
          git diff --cached --quiet \
            && echo "No changes — skipping commit." \
            || git commit -m "chore: update current.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

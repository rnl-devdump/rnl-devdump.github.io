name: Update Utility Rates Data

on:
  schedule:
    # Runs at 00:00 UTC (8:00 AM PHT) daily
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3

    - name: Execute rates scraper script
      run: |
        python scraper.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if git status --porcelain | grep -qE "rates.json|raw_rates.json"; then
          git add rates.json raw_rates.json
          git commit -m "chore: automated update of utility rates data [skip ci]"
          git push
        else
          echo "No changes detected in rates data files."
        fi

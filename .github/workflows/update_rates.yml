name: Update CENPELCO Rates for Bill Subfolder

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    # Explicitly grant the job permission to write content back to the repository
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg

    - name: Install Python packages
      run: |
        pip install beautifulsoup4 playwright
        playwright install chromium
        playwright install-deps chromium

    - name: Run Playwright Scraper
      working-directory: ./bill
      run: python scraper.py

    # Securely commit the file using the GitHub Token context
    - name: Commit and Push Updated Rates
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update of Lingayen Residential Rates in /bill"
        file_pattern: 'bill/rates.json'
        branch: main

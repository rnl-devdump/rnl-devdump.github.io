<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var search = window.location.search || "";
        var hash = window.location.hash || "";

        // GitHub Pages fallback for deep links under /letter/<documentId>.
        if (path.indexOf("/letter/") === 0) {
          var parts = path.split("/").filter(Boolean);
          var docId = parts.length >= 2 ? parts[1] : "";
          if (docId === "entries") {
            window.location.replace("/letter/entries/");
            return;
          }
          if (docId === "helper") {
            window.location.replace("/letterhelper/");
            return;
          }
          if (docId) {
            var target = "/letter/?id=" + encodeURIComponent(docId);
            if (search) target += "&" + search.replace(/^\?/, "");
            if (hash) target += hash;
            window.location.replace(target);
            return;
          }
          window.location.replace("/letter/");
          return;
        }

        if (path.indexOf("/letterx/") === 0) {
          var partsX = path.split("/").filter(Boolean);
          var segX = partsX.length >= 2 ? partsX[1] : "";
          if (segX === "entries") {
            window.location.replace("/letter/entries/");
            return;
          }
          if (segX) {
            var targetX = "/letterx/?id=" + encodeURIComponent(segX);
            if (search) targetX += "&" + search.replace(/^\?/, "");
            if (hash) targetX += hash;
            window.location.replace(targetX);
            return;
          }
          window.location.replace("/letterx/");
          return;
        }

        // Default fallback route.
        window.location.replace("/dataset/");
      })();
    </script>
  </head>
  <body></body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENPELCO Rate Calculator - Lingayen</title>
    <style>
        :root {
            --primary: #0275d8;
            --success: #5cb85c;
            --dark: #292b2c;
            --light: #f7f7f7;
            --border: #eceeef;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #e9ecef;
            color: var(--dark);
        }
        .container {
            max-width: 500px;
            margin: 30px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .meta-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        .meta-table td {
            padding: 8px 4px;
            border-bottom: 1px solid var(--border);
        }
        .meta-table td:first-child {
            font-weight: 600;
            color: #636c72;
        }
        .meta-table td:last-child {
            text-align: right;
        }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 1.1em;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: var(--primary);
            outline: none;
        }
        .unit-badge {
            position: absolute;
            right: 12px;
            color: #818a91;
            font-weight: bold;
        }
        .calc-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .calc-btn:hover {
            background-color: #025aa5;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background-color: var(--light);
            border-left: 5px solid var(--success);
            display: none;
        }
        .result-box h3 {
            margin: 0 0 10px 0;
            color: var(--dark);
        }
        .total-price {
            font-size: 1.8em;
            font-weight: 800;
            color: var(--success);
        }
        .breakdown-text {
            font-size: 0.85em;
            color: #636c72;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CENPELCO Estimator</h2>
    
    <table class="meta-table">
        <tr>
            <td>Coverage Period</td>
            <td id="lbl-month">Fetching...</td>
        </tr>
        <tr>
            <td>Target Municipality</td>
            <td id="lbl-town">Lingayen (Zone 13)</td>
        </tr>
        <tr>
            <td>Consumer Classification</td>
            <td>Residential (R)</td>
        </tr>
        <tr>
            <td>Effective Generation & Base</td>
            <td id="lbl-rate">0.0000 ₱/kWh</td>
        </tr>
        <tr>
            <td>Fixed Metering Charge</td>
            <td id="lbl-fixed">0.00 ₱/Mo</td>
        </tr>
    </table>

    <div class="form-group">
        <label for="kwh-input">Electricity Consumption:</label>
        <div class="input-wrapper">
            <input type="number" id="kwh-input" placeholder="Enter total meter usage" min="0" step="0.01">
            <span class="unit-badge">kWh</span>
        </div>
    </div>

    <button class="calc-btn" onclick="executeCalculation()">Compute Statement</button>

    <div class="result-box" id="result-display">
        <h3>Estimated Statement</h3>
        <div class="total-price" id="total-cost">₱0.00</div>
        <div class="breakdown-text" id="breakdown-desc"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
